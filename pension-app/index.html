        <h2 style="margin-top:2rem">Key concepts explained</h2>

        <h3>What is a pension replacement rate?</h3>
        <p>The <strong>replacement rate</strong> is monthly pension income ÷ pre-retirement gross monthly wage, expressed as a percentage. A 70&nbsp;% gross replacement rate means a worker earning €3,000/month before retirement receives €2,100/month in pension. It is the single most useful summary of how generous a pension system is relative to prior earnings. Note that gross and net (after-tax) replacement rates can differ significantly: countries with high pension taxes narrow the net gap more than their gross rate suggests.</p>

        <h3>What is the difference between gross and net replacement rate?</h3>
        <p>The <strong>gross replacement rate</strong> compares pre-tax pension to pre-tax wage. The <strong>net replacement rate</strong> compares post-tax pension to post-tax wage — and is generally higher, because pension income is taxed more lightly (or not at all) in many countries. The interactive tool shows both, plus the income tax and SSC breakdown at each wage level.</p>

        <h3>What are social security contributions (SSC)?</h3>
        <p>Social security contributions (SSC) are mandatory payroll levies paid by employees and employers to fund pension, health, and unemployment insurance schemes. In high-SSC countries like France and the Netherlands, employer contributions can exceed 30&nbsp;% of gross wage on top of the employee share. The tool shows how SSC is split between pension, health, and other funds for each country and wage level.</p>

        <h3>What is a PAYG pension?</h3>
        <p>A <strong>pay-as-you-go (PAYG)</strong> pension — most EU countries use this — funds current retiree pensions from contributions paid today by workers. Contrast this with a <strong>funded</strong> system, where contributions are invested and returned to the same worker later. Most EU statutory pensions are DB (defined benefit) PAYG. A few (Italy, Poland, Sweden, Latvia, Estonia) use Notional Defined Contribution (NDC) accounts that mimic funded logic within a PAYG structure.</p>

        <h3>What is the average wage multiplier?</h3>
        <p>The average wage (AW) multiplier expresses gross wage as a fraction of the country's national average wage. A value of 1.0 means the average earner; 0.67 approximates the median in most EU countries (the median is lower than the mean because wage distributions are right-skewed); 2.0 means twice the average. Comparing replacement rates at different AW multiples reveals how redistributive a pension system is: systems with a large flat-rate component (like Ireland or Denmark) are more generous to low earners; strictly proportional systems (like Italy or Hungary) give the same rate at all wage levels.</p>

        <h2 style="margin-top:2rem">Frequently asked questions</h2>

        <h3>Which EU country has the best pension system?</h3>
        <p>It depends what you optimise for. By gross replacement rate at average wage, the Netherlands (96&nbsp;%), Italy (91&nbsp;%), and Luxembourg (87.7&nbsp;%) are highest. But the Netherlands requires working until 70 and has high employer SSC; Luxembourg has the earliest retirement age (62). By net replacement rate after income tax and SSC, the ranking shifts. The interactive tool lets you compare net outcomes side-by-side and adjust career length, wage level, and retirement age.</p>

        <h3>How does the German pension compare to France?</h3>
        <p>Germany's gross replacement rate (53.3&nbsp;%) at the average wage is notably lower than France's (70.0&nbsp;%). Germany uses a points-based system where pensions scale proportionally with lifetime earnings, while France combines a basic PAYG scheme (Régime Général) with a mandatory supplementary PAYG points system (AGIRC-ARRCO). Both retire at 65–67; employee+employer SSC also differ. The tool allows a direct side-by-side comparison including net wages, career contributions, and break-even age.</p>

        <h3>Do EU countries tax pension income?</h3>
        <p>Most EU countries apply income tax to pensions, but typically at a lower effective rate than active wages due to lower pension amounts sitting in lower tax brackets and in some countries favourable pension-specific deductions. The tool models basic statutory income tax on pension income for each country.</p>

        <h3>Why is Italy's replacement rate 91 % at every wage level?</h3>
        <p>Italy uses a purely proportional NDC (Notional Defined Contribution) system introduced in 1995 (Dini reform). Because contributions are credited as a fixed percentage of every euro earned regardless of wage level, the replacement rate is mathematically identical at 0.5×, 1.0×, and 2.0× average wage. This makes it one of the least redistributive systems in the EU, though conversely the most predictable.</p>

        <h3>Can I use this for personal retirement planning?</h3>
        <p>This tool is for illustrative and educational purposes only — <strong>not financial advice</strong>. It models statutory (Pillar 1) pensions using simplified formulas and does not account for individual career gaps, occupational pensions (Pillar 2), voluntary savings (Pillar 3), future legislative changes, or personal tax circumstances. Always consult a qualified financial adviser before making retirement decisions.
